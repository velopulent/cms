syntax = "proto3";

package cms.v1;

// Collection Service - Site-scoped operations (requires cms_site_* token)
service CollectionService {
  rpc ListCollections(ListCollectionsRequest) returns (ListCollectionsResponse);
  rpc GetCollection(GetCollectionRequest) returns (Collection);
  rpc CreateCollection(CreateCollectionRequest) returns (Collection);
  rpc UpdateCollection(UpdateCollectionRequest) returns (Collection);
  rpc DeleteCollection(DeleteCollectionRequest) returns (DeleteResponse);
}

// Entry Service - Site-scoped operations (requires cms_site_* token)
service EntryService {
  rpc ListEntries(ListEntriesRequest) returns (ListEntriesResponse);
  rpc GetEntry(GetEntryRequest) returns (Entry);
  rpc CreateEntry(CreateEntryRequest) returns (Entry);
  rpc UpdateEntry(UpdateEntryRequest) returns (Entry);
  rpc DeleteEntry(DeleteEntryRequest) returns (DeleteResponse);
  rpc PublishEntry(PublishEntryRequest) returns (Entry);
  rpc UnpublishEntry(UnpublishEntryRequest) returns (Entry);
  rpc ListEntryRevisions(ListEntryRevisionsRequest) returns (ListEntryRevisionsResponse);
  rpc GetEntryRevision(GetEntryRevisionRequest) returns (EntryRevision);
  rpc RestoreEntryRevision(RestoreEntryRevisionRequest) returns (Entry);
}

// Singleton Service - Site-scoped operations (requires cms_site_* token)
service SingletonService {
  rpc GetSingleton(GetSingletonRequest) returns (Singleton);
  rpc UpdateSingleton(UpdateSingletonRequest) returns (Singleton);
}

// File Service - Site-scoped operations (requires cms_site_* token)
service FileService {
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
  rpc GetFile(GetFileRequest) returns (File);
  rpc DeleteFile(DeleteFileRequest) returns (DeleteResponse);
  rpc RestoreFile(RestoreFileRequest) returns (File);
  rpc BatchDeleteFiles(BatchDeleteFilesRequest) returns (BatchOperationResponse);
  rpc BatchRestoreFiles(BatchRestoreFilesRequest) returns (BatchOperationResponse);
}

// Site Service - Site-scoped operations (requires cms_site_* token)
service SiteService {
  rpc GetSite(GetSiteRequest) returns (Site);
  rpc UpdateSite(UpdateSiteRequest) returns (Site);
}

// Common Messages

message DeleteResponse {
  bool success = 1;
  string message = 2;
}

message BatchOperationResponse {
  int64 affected = 1;
}

// Collection Messages

message Collection {
  string id = 1;
  string site_id = 2;
  string name = 3;
  string slug = 4;
  string definition = 5;
  bool is_singleton = 6;
  string created_at = 7;
  string updated_at = 8;
}

message ListCollectionsRequest {}

message ListCollectionsResponse {
  repeated Collection collections = 1;
}

message GetCollectionRequest {
  string slug = 1;
}

message CreateCollectionRequest {
  string name = 1;
  string slug = 2;
  string definition = 3;
  bool is_singleton = 4;
}

message UpdateCollectionRequest {
  string id = 1;
  optional string name = 2;
  optional string slug = 3;
  optional string definition = 4;
}

message DeleteCollectionRequest {
  string id = 1;
  string slug = 2;
}

// Entry Messages

message Entry {
  string id = 1;
  string site_id = 2;
  string collection_id = 3;
  string data = 4;
  string slug = 5;
  string status = 6;
  optional string singleton_collection_id = 7;
  string created_at = 8;
  string updated_at = 9;
  optional string published_at = 10;
}

message ListEntriesRequest {
  optional string collection_id = 1;
  optional string status = 2;
  optional string search = 3;
  int64 page = 4;
  int64 per_page = 5;
}

message ListEntriesResponse {
  repeated Entry items = 1;
  int64 total = 2;
  int64 page = 3;
  int64 per_page = 4;
}

message GetEntryRequest {
  string id = 1;
}

message CreateEntryRequest {
  string collection_id = 1;
  string data = 2;
  string slug = 3;
}

message UpdateEntryRequest {
  string id = 1;
  optional string data = 2;
  optional string slug = 3;
  optional string status = 4;
  optional string change_summary = 5;
}

message DeleteEntryRequest {
  string id = 1;
}

message PublishEntryRequest {
  string id = 1;
}

message UnpublishEntryRequest {
  string id = 1;
}

message EntryRevision {
  string id = 1;
  string entry_id = 2;
  int64 revision_number = 3;
  string data = 4;
  optional string created_by = 5;
  string created_at = 6;
  optional string change_summary = 7;
}

message ListEntryRevisionsRequest {
  string entry_id = 1;
  int64 page = 2;
  int64 per_page = 3;
}

message ListEntryRevisionsResponse {
  repeated EntryRevision items = 1;
  int64 total = 2;
  int64 page = 3;
  int64 per_page = 4;
}

message GetEntryRevisionRequest {
  string entry_id = 1;
  int64 revision_number = 2;
}

message RestoreEntryRevisionRequest {
  string entry_id = 1;
  int64 revision_number = 2;
}

// Singleton Messages

message Singleton {
  string id = 1;
  string site_id = 2;
  string name = 3;
  string slug = 4;
  string definition = 5;
  optional string data = 6;
  optional string entry_id = 7;
  string created_at = 8;
  string updated_at = 9;
}

message GetSingletonRequest {
  string slug = 1;
}

message UpdateSingletonRequest {
  string slug = 1;
  string data = 2;
  optional string change_summary = 3;
}

// File Messages

message File {
  string id = 1;
  string site_id = 2;
  string filename = 3;
  string original_name = 4;
  string mime_type = 5;
  int64 size = 6;
  string storage_provider = 7;
  string storage_key = 8;
  optional string thumbnail_key = 9;
  optional int32 width = 10;
  optional int32 height = 11;
  optional string deleted_at = 12;
  optional string created_by = 13;
  string created_at = 14;
}

message ListFilesRequest {
  optional string search = 1;
  optional string file_type = 2;
  int64 page = 3;
  int64 per_page = 4;
}

message ListFilesResponse {
  repeated File files = 1;
  int64 total = 2;
  int64 page = 3;
  int64 per_page = 4;
}

message GetFileRequest {
  string id = 1;
}

message DeleteFileRequest {
  string id = 1;
}

message RestoreFileRequest {
  string id = 1;
}

message BatchDeleteFilesRequest {
  repeated string ids = 1;
}

message BatchRestoreFilesRequest {
  repeated string ids = 1;
}

// Site Messages

message Site {
  string id = 1;
  string name = 2;
  string storage_provider = 3;
  string created_by = 4;
  string created_at = 5;
  string updated_at = 6;
}

message SiteMember {
  string id = 1;
  string site_id = 2;
  string user_id = 3;
  string username = 4;
  string email = 5;
  string role = 6;
  string created_at = 7;
}

message GetSiteRequest {
  string site_id = 1;
}

message UpdateSiteRequest {
  string site_id = 1;
  optional string name = 2;
}

// Webhook Service - Site-scoped operations (requires cms_site_* token)
service WebhookService {
  rpc ListWebhooks(ListWebhooksRequest) returns (ListWebhooksResponse);
  rpc GetWebhook(GetWebhookRequest) returns (SiteWebhook);
  rpc CreateWebhook(CreateWebhookRequest) returns (SiteWebhook);
  rpc UpdateWebhook(UpdateWebhookRequest) returns (SiteWebhook);
  rpc DeleteWebhook(DeleteWebhookRequest) returns (DeleteResponse);
  rpc TriggerWebhook(TriggerWebhookRequest) returns (WebhookDelivery);
  rpc ListWebhookDeliveries(ListWebhookDeliveriesRequest) returns (ListWebhookDeliveriesResponse);
}

message SiteWebhook {
  string id = 1;
  string site_id = 2;
  string label = 3;
  string url = 4;
  map<string, string> headers = 5;
  optional string created_by = 6;
  string created_at = 7;
  string updated_at = 8;
}

message WebhookDelivery {
  string id = 1;
  string webhook_id = 2;
  string status = 3;
  optional int32 status_code = 4;
  optional string response_body = 5;
  optional int64 duration_ms = 6;
  optional string triggered_by = 7;
  string triggered_at = 8;
}

message ListWebhooksRequest {
  string site_id = 1;
}

message ListWebhooksResponse {
  repeated SiteWebhook webhooks = 1;
}

message GetWebhookRequest {
  string site_id = 1;
  string webhook_id = 2;
}

message CreateWebhookRequest {
  string site_id = 1;
  string label = 2;
  string url = 3;
  map<string, string> headers = 4;
}

message UpdateWebhookRequest {
  string site_id = 1;
  string webhook_id = 2;
  optional string label = 3;
  optional string url = 4;
  map<string, string> headers = 5;
}

message DeleteWebhookRequest {
  string site_id = 1;
  string webhook_id = 2;
}

message TriggerWebhookRequest {
  string site_id = 1;
  string webhook_id = 2;
}

message ListWebhookDeliveriesRequest {
  string site_id = 1;
  string webhook_id = 2;
  int64 page = 3;
  int64 per_page = 4;
}

message ListWebhookDeliveriesResponse {
  repeated WebhookDelivery items = 1;
  int64 total = 2;
  int64 page = 3;
  int64 per_page = 4;
}
