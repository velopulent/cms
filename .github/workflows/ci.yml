name: CI

on:
  pull_request:
  push:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  lint:
    name: Rust lint (fmt + clippy)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/backend
      - run: cargo fmt --all -- --check
      - run: cargo clippy --all-targets --locked -- -D warnings

  test:
    name: Tests (${{ matrix.db }})
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/backend
    strategy:
      fail-fast: false
      matrix:
        # SQLite runs fully parallel (in-memory, isolated per test). Postgres and
        # MySQL run database-per-test against one shared server, so test threads are
        # capped to keep the connection demand well under the server's ceiling on
        # high-core runners.
        include:
          - db: sqlite
            test_database: sqlite
            test_database_url: ""
            test_args: ""
          - db: postgres
            test_database: postgres
            test_database_url: postgres://postgres:postgres@localhost:5432/postgres
            test_args: "-- --test-threads=4"
          - db: mysql
            test_database: mysql
            test_database_url: mysql://root:root@localhost:3306/mysql
            test_args: "-- --test-threads=4"
    env:
      TEST_DATABASE: ${{ matrix.test_database }}
      TEST_DATABASE_URL: ${{ matrix.test_database_url }}
    # Both services run for every lane; the sqlite lane simply ignores them
    # (GitHub Actions can't attach services conditionally per matrix value).
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: postgres
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U postgres"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
      mysql:
        image: mysql:8
        env:
          MYSQL_ROOT_PASSWORD: root
        ports:
          - 3306:3306
        options: >-
          --health-cmd "mysqladmin ping -h 127.0.0.1 -uroot -proot"
          --health-interval 2s
          --health-timeout 5s
          --health-retries 15
    steps:
      - uses: actions/checkout@v4
      - name: Install protoc
        run: sudo apt-get update && sudo apt-get install -y protobuf-compiler
      - uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: apps/backend
          key: ${{ matrix.db }}
      - name: cargo test
        run: cargo test --locked ${{ matrix.test_args }}

  frontend:
    name: Frontend (dashboard)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Biome lint
        run: bunx nx run dashboard:lint
      - name: Typecheck
        run: bun run test:dashboard
      - name: Build
        run: bun run build:dashboard

  web:
    name: Web (landing + docs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - name: Build
        run: bun run build:web
