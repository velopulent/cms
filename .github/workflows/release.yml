name: Release

# Tag-driven. Push a tag like `v1.2.3` to build per-OS binaries and attach them to
# a GitHub Release. The release binary embeds apps/dashboard/dist via rust-embed,
# so the dashboard MUST be built before `cargo build --release`.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            bin: cms
            asset: cms-x86_64-linux
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            bin: cms.exe
            asset: cms-x86_64-windows.exe
          - os: macos-latest
            target: aarch64-apple-darwin
            bin: cms
            asset: cms-aarch64-macos
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      - uses: dtolnay/rust-toolchain@3c5f7ea28cd621ae0bf5283f0e981fb97b8a7af9 # master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: apps/backend
          key: release-${{ matrix.target }}
      # Persist the Nx local cache across runs. Ephemeral runners wipe .nx/cache, so
      # without this Nx caching is a no-op. This lets dashboard:build (8-10s) replay
      # from cache instead of rebuilding; the Rust compile stays on rust-cache above.
      - uses: actions/cache@5a3ec84eff668545956fd18022155c47e93e2684 # v4.2.3
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('apps/dashboard/**', 'bun.lock', 'package.json', 'nx.json') }}
          restore-keys: |
            nx-${{ runner.os }}-

      # Single Nx command owns the dashboard -> backend ordering: backend:build
      # dependsOn dashboard:build (rust-embed bakes apps/dashboard/dist into the
      # binary) and sets SKIP_DASHBOARD_BUILD=1 so cargo consumes the built dist.
      - name: Build release binary (dashboard + backend via Nx)
        run: |
          bun install --frozen-lockfile
          bunx nx run backend:build

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.bin }}" "dist/${{ matrix.asset }}"

      - name: Attach to release
        uses: softprops/action-gh-release@3bb12739c298aeb8a4eeaf626c5b8d85266b0e65 # v2
        with:
          files: dist/${{ matrix.asset }}
          generate_release_notes: true
