name: Release

# Tag-driven. Push a tag like `v1.2.3` to build per-OS/arch binaries and attach them
# to a GitHub Release. The release binary embeds apps/dashboard/dist via rust-embed,
# so the dashboard MUST be built before `cargo build --release`.
#
# The dashboard dist is static (JS/HTML) and identical for every target, so it is
# built ONCE here and shared to all build jobs as an artifact. The build matrix then
# runs natively on each OS/arch (no cross-compilation) and compiles cargo directly.
on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  # Build the static dashboard once. Every build job consumes this same dist.
  dashboard:
    name: Build dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2
      # Persist the Nx local cache across runs. Ephemeral runners wipe .nx/cache, so
      # without this Nx caching is a no-op. This lets dashboard:build (8-10s) replay
      # from cache instead of rebuilding.
      - uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('apps/dashboard/**', 'bun.lock', 'package.json', 'nx.json') }}
          restore-keys: |
            nx-${{ runner.os }}-
      - name: Build dashboard
        run: |
          bun install --frozen-lockfile
          bunx nx run dashboard:build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dashboard-dist
          path: apps/dashboard/dist
          if-no-files-found: error

  build:
    name: Build (${{ matrix.os }}-${{ matrix.arch }})
    needs: dashboard
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
            bin: vcms
            asset: vcms-${{ github.ref_name }}-linux-amd64
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
            bin: vcms
            asset: vcms-${{ github.ref_name }}-linux-arm64
          - os: macos
            arch: amd64
            runner: macos-26-intel
            bin: vcms
            asset: vcms-${{ github.ref_name }}-macos-amd64
          - os: macos
            arch: arm64
            runner: macos-26
            bin: vcms
            asset: vcms-${{ github.ref_name }}-macos-arm64
          - os: windows
            arch: amd64
            runner: windows-latest
            bin: vcms.exe
            asset: vcms-${{ github.ref_name }}-windows-amd64.exe
          - os: windows
            arch: arm64
            runner: windows-11-arm
            bin: vcms.exe
            asset: vcms-${{ github.ref_name }}-windows-arm64.exe
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # rust-embed (#[folder = "../dashboard/dist"]) needs the built dashboard present
      # at compile time. Pull the shared artifact into apps/dashboard/dist.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dashboard-dist
          path: apps/dashboard/dist
      - uses: arduino/setup-protoc@c65c819552d16ad3c9b72d9dfd5ba5237b9c906b # v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # Installs the host toolchain, which on each runner is already the target arch
      # (native build, no --target needed).
      - uses: dtolnay/rust-toolchain@67ef31d5b988238dd797d409d6f9574278e20537 # master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          # Workspace root is the REPO root (Cargo.lock + target/ live there);
          # cargo runs from apps/backend but artifacts land in <root>/target.
          workspaces: ". -> target"
          key: release-${{ matrix.os }}-${{ matrix.arch }}

      # Build cargo directly (dist is already present from the artifact); keep the
      # default `embed-dashboard` feature so rust-embed bakes in apps/dashboard/dist.
      - name: Build release binary
        working-directory: apps/backend
        run: cargo build --release --locked

      - name: Stage artifact
        shell: bash
        run: |
          mkdir -p dist
          cp "target/release/${{ matrix.bin }}" "dist/${{ matrix.asset }}"

      - name: Attach to release
        uses: softprops/action-gh-release@718ea10b132b3b2eba29c1007bb80653f286566b # v3.0.1
        with:
          files: dist/${{ matrix.asset }}
          generate_release_notes: true
