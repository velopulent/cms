name: Release

# Tag-driven. Push a tag like `v1.2.3` to build per-OS/arch binaries and attach them
# to a GitHub Release. The release binary embeds apps/dashboard/dist via rust-embed,
# so the dashboard MUST be built before `cargo build --release`.
#
# The dashboard dist is static (JS/HTML) and identical for every target, so it is
# built ONCE here and shared to all build jobs as an artifact. The build matrix then
# runs natively on each OS/arch (no cross-compilation) and compiles cargo directly.
on:
  push:
    tags:
      - "v*"

jobs:
  # Build the static dashboard once. Every build job consumes this same dist.
  dashboard:
    name: Build dashboard
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      - uses: oven-sh/setup-bun@0c5077e51419868618aeaa5fe8019c62421857d6 # v2.2.0
      # Persist the Nx local cache across runs. Ephemeral runners wipe .nx/cache, so
      # without this Nx caching is a no-op. This lets dashboard:build (8-10s) replay
      # from cache instead of rebuilding.
      - uses: actions/cache@55cc8345863c7cc4c66a329aec7e433d2d1c52a9 # v6.1.0
        with:
          path: .nx/cache
          key: nx-${{ runner.os }}-${{ hashFiles('apps/dashboard/**', 'bun.lock', 'package.json', 'nx.json') }}
          restore-keys: |
            nx-${{ runner.os }}-
      - name: Build dashboard
        run: |
          bun install --frozen-lockfile
          bunx nx run dashboard:build
      - uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: dashboard-dist
          path: apps/dashboard/dist
          if-no-files-found: error

  build:
    name: Build/package (${{ matrix.os }}-${{ matrix.arch }})
    needs: dashboard
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            arch: amd64
            runner: ubuntu-latest
          - os: linux
            arch: arm64
            runner: ubuntu-24.04-arm
          - os: macos
            arch: amd64
            runner: macos-26-intel
          - os: macos
            arch: arm64
            runner: macos-26
          - os: windows
            arch: amd64
            runner: windows-latest
          - os: windows
            arch: arm64
            runner: windows-11-arm
    steps:
      - uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false
      # rust-embed (#[folder = "../dashboard/dist"]) needs the built dashboard present
      # at compile time. Pull the shared artifact into apps/dashboard/dist.
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          name: dashboard-dist
          path: apps/dashboard/dist
      - uses: arduino/setup-protoc@f4d5893b897028ff5739576ea0409746887fa536 # v3.0.0
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}
      # Installs the host toolchain, which on each runner is already the target arch
      # (native build, no --target needed).
      - uses: dtolnay/rust-toolchain@fa04a1451ff1842e2626ccb99004d0195b455a88 # master
        with:
          toolchain: "1.94"
      - uses: Swatinem/rust-cache@23869a5bd66c73db3c0ac40331f3206eb23791dc # v2.9.1
        with:
          # Workspace root is the REPO root (Cargo.lock + target/ live there);
          # cargo runs from apps/backend but artifacts land in <root>/target.
          workspaces: ". -> target"
          key: release-${{ matrix.os }}-${{ matrix.arch }}

      - name: Install Linux packaging tools
        if: matrix.os == 'linux'
        run: sudo apt-get update && sudo apt-get install -y rpm

      - name: Install WiX
        if: matrix.os == 'windows'
        shell: pwsh
        run: |
          dotnet tool install --global wix --version 7.*
          wix eula accept wix7
          wix extension add --global WixToolset.UI.wixext/7.0.0

      # Build cargo directly (dist is already present from the artifact); keep the
      # default `embed-dashboard` feature so rust-embed bakes in apps/dashboard/dist.
      - name: Build release binary
        working-directory: apps/backend
        run: cargo build --release --locked

      - name: Package artifacts
        run: cargo run -p xtask -- package --kind host --skip-build --target-os ${{ matrix.os }} --arch ${{ matrix.arch }}

      - name: Upload release artifacts
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: release-${{ matrix.os }}-${{ matrix.arch }}
          path: dist/packages/*
          if-no-files-found: error

  publish:
    name: Attest and publish release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
      id-token: write
      attestations: write
    steps:
      - uses: actions/download-artifact@3e5f45b2cfb9172054b4087a40e8e0b5a5461e7c # v8.0.1
        with:
          pattern: release-*
          path: dist/packages
          merge-multiple: true
      - name: Attest build provenance
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4.1.1
        with:
          subject-path: dist/packages/*
      - name: Attach all artifacts after matrix passes
        uses: softprops/action-gh-release@fe965f7af51af5f2602596916f38a38df2e33de0 # v3.0.2
        with:
          files: dist/packages/*
          generate_release_notes: true
