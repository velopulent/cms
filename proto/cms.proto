syntax = "proto3";

package cms.v1;

// Collection Service - Site-scoped operations (requires cms_sk_* token)
service CollectionService {
  rpc ListCollections(ListCollectionsRequest) returns (ListCollectionsResponse);
  rpc GetCollection(GetCollectionRequest) returns (Collection);
  rpc CreateCollection(CreateCollectionRequest) returns (Collection);
  rpc UpdateCollection(UpdateCollectionRequest) returns (Collection);
  rpc DeleteCollection(DeleteCollectionRequest) returns (DeleteResponse);
}

// Entry Service - Site-scoped operations (requires cms_sk_* token)
service EntryService {
  rpc ListEntries(ListEntriesRequest) returns (ListEntriesResponse);
  rpc GetEntry(GetEntryRequest) returns (Entry);
  rpc CreateEntry(CreateEntryRequest) returns (Entry);
  rpc UpdateEntry(UpdateEntryRequest) returns (Entry);
  rpc DeleteEntry(DeleteEntryRequest) returns (DeleteResponse);
  rpc PublishEntry(PublishEntryRequest) returns (Entry);
  rpc UnpublishEntry(UnpublishEntryRequest) returns (Entry);
}

// Singleton Service - Site-scoped operations (requires cms_sk_* token)
service SingletonService {
  rpc GetSingleton(GetSingletonRequest) returns (Singleton);
  rpc UpdateSingleton(UpdateSingletonRequest) returns (Singleton);
}

// File Service - Site-scoped operations (requires cms_sk_* token)
service FileService {
  rpc ListFiles(ListFilesRequest) returns (ListFilesResponse);
  rpc GetFile(GetFileRequest) returns (File);
  rpc DeleteFile(DeleteFileRequest) returns (DeleteResponse);
  rpc RestoreFile(RestoreFileRequest) returns (File);
  rpc BatchDeleteFiles(BatchDeleteFilesRequest) returns (BatchOperationResponse);
  rpc BatchRestoreFiles(BatchRestoreFilesRequest) returns (BatchOperationResponse);
}

// Site Service - Instance-scoped operations (requires cms_ik_* token)
service SiteService {
  rpc ListSites(ListSitesRequest) returns (ListSitesResponse);
  rpc GetSite(GetSiteRequest) returns (Site);
  rpc CreateSite(CreateSiteRequest) returns (Site);
  rpc UpdateSite(UpdateSiteRequest) returns (Site);
  rpc DeleteSite(DeleteSiteRequest) returns (DeleteResponse);
}

// Membership Service - Instance-scoped operations (requires cms_ik_* token)
service MembershipService {
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
  rpc InviteMember(InviteMemberRequest) returns (SiteMember);
  rpc UpdateMemberRole(UpdateMemberRoleRequest) returns (SiteMember);
  rpc RemoveMember(RemoveMemberRequest) returns (DeleteResponse);
}

// Token Service - Unified (requires cms_ik_* or cms_sk_* based on operation)
// Instance token operations: ListInstanceTokens, CreateInstanceToken, DeleteInstanceToken
// Site token operations: ListSiteTokens, CreateSiteToken, DeleteSiteToken
service TokenService {
  rpc ListInstanceTokens(ListInstanceTokensRequest) returns (ListInstanceTokensResponse);
  rpc CreateInstanceToken(CreateInstanceTokenRequest) returns (CreateTokenResponse);
  rpc DeleteInstanceToken(DeleteInstanceTokenRequest) returns (DeleteResponse);
  rpc ListSiteTokens(ListSiteTokensRequest) returns (ListSiteTokensResponse);
  rpc CreateSiteToken(CreateSiteTokenRequest) returns (CreateTokenResponse);
  rpc DeleteSiteToken(DeleteSiteTokenRequest) returns (DeleteResponse);
}

// Common Messages

message DeleteResponse {
  bool success = 1;
  string message = 2;
}

message BatchOperationResponse {
  int64 affected = 1;
}

// Collection Messages

message Collection {
  string id = 1;
  string site_id = 2;
  string name = 3;
  string slug = 4;
  string definition = 5;
  bool is_singleton = 6;
  optional string singleton_data = 7;
  string created_at = 8;
  string updated_at = 9;
}

message ListCollectionsRequest {}

message ListCollectionsResponse {
  repeated Collection collections = 1;
}

message GetCollectionRequest {
  string slug = 1;
}

message CreateCollectionRequest {
  string name = 1;
  string slug = 2;
  string definition = 3;
  bool is_singleton = 4;
}

message UpdateCollectionRequest {
  string id = 1;
  optional string name = 2;
  optional string slug = 3;
  optional string definition = 4;
}

message DeleteCollectionRequest {
  string id = 1;
  string slug = 2;
}

// Entry Messages

message Entry {
  string id = 1;
  string site_id = 2;
  string collection_id = 3;
  string data = 4;
  string slug = 5;
  string status = 6;
  string created_at = 7;
  string updated_at = 8;
  optional string published_at = 9;
}

message ListEntriesRequest {
  optional string collection_id = 1;
  optional string status = 2;
  optional string search = 3;
  int64 page = 4;
  int64 per_page = 5;
}

message ListEntriesResponse {
  repeated Entry items = 1;
  int64 total = 2;
  int64 page = 3;
  int64 per_page = 4;
}

message GetEntryRequest {
  string id = 1;
}

message CreateEntryRequest {
  string collection_id = 1;
  string data = 2;
  string slug = 3;
}

message UpdateEntryRequest {
  string id = 1;
  optional string data = 2;
  optional string slug = 3;
  optional string status = 4;
}

message DeleteEntryRequest {
  string id = 1;
}

message PublishEntryRequest {
  string id = 1;
}

message UnpublishEntryRequest {
  string id = 1;
}

// Singleton Messages

message Singleton {
  string id = 1;
  string site_id = 2;
  string name = 3;
  string slug = 4;
  string definition = 5;
  optional string data = 6;
  string created_at = 7;
  string updated_at = 8;
}

message GetSingletonRequest {
  string slug = 1;
}

message UpdateSingletonRequest {
  string slug = 1;
  string data = 2;
}

// File Messages

message File {
  string id = 1;
  string site_id = 2;
  string filename = 3;
  string original_name = 4;
  string mime_type = 5;
  int64 size = 6;
  string storage_provider = 7;
  string storage_key = 8;
  optional string thumbnail_key = 9;
  optional int32 width = 10;
  optional int32 height = 11;
  optional string deleted_at = 12;
  optional string created_by = 13;
  string created_at = 14;
}

message ListFilesRequest {
  optional string search = 1;
  optional string file_type = 2;
  int64 page = 3;
  int64 per_page = 4;
}

message ListFilesResponse {
  repeated File files = 1;
  int64 total = 2;
  int64 page = 3;
  int64 per_page = 4;
}

message GetFileRequest {
  string id = 1;
}

message DeleteFileRequest {
  string id = 1;
}

message RestoreFileRequest {
  string id = 1;
}

message BatchDeleteFilesRequest {
  repeated string ids = 1;
}

message BatchRestoreFilesRequest {
  repeated string ids = 1;
}

// Site Messages

message Site {
  string id = 1;
  string name = 2;
  string storage_provider = 3;
  string created_by = 4;
  string created_at = 5;
  string updated_at = 6;
}

message SiteMember {
  string id = 1;
  string site_id = 2;
  string user_id = 3;
  string username = 4;
  string email = 5;
  string role = 6;
  string created_at = 7;
}

message ListSitesRequest {}

message ListSitesResponse {
  repeated Site sites = 1;
}

message GetSiteRequest {
  string site_id = 1;
}

message CreateSiteRequest {
  string name = 1;
  optional string storage_provider = 2;
}

message UpdateSiteRequest {
  string site_id = 1;
  optional string name = 2;
  optional string storage_provider = 3;
}

message DeleteSiteRequest {
  string site_id = 1;
}

message ListMembersRequest {
  string site_id = 1;
}

message ListMembersResponse {
  repeated SiteMember members = 1;
}

message InviteMemberRequest {
  string site_id = 1;
  string username = 2;
  string role = 3;
}

message UpdateMemberRoleRequest {
  string site_id = 1;
  string user_id = 2;
  string role = 3;
}

message RemoveMemberRequest {
  string site_id = 1;
  string user_id = 2;
}

// Token Messages

message AccessToken {
  string id = 1;
  string kind = 2;
  optional string site_id = 3;
  string name = 4;
  string token_prefix = 5;
  repeated string scopes = 6;
  optional string created_by_user_id = 7;
  optional string last_used_at = 8;
  string created_at = 9;
  optional string expires_at = 10;
  optional string revoked_at = 11;
}

message CreateTokenResponse {
  AccessToken access_token = 1;
  string token = 2;
}

message ListInstanceTokensRequest {}

message ListInstanceTokensResponse {
  repeated AccessToken tokens = 1;
}

message CreateInstanceTokenRequest {
  string name = 1;
  repeated string scopes = 2;
}

message DeleteInstanceTokenRequest {
  string token_id = 1;
}

message ListSiteTokensRequest {
  string site_id = 1;
}

message ListSiteTokensResponse {
  repeated AccessToken tokens = 1;
}

message CreateSiteTokenRequest {
  string site_id = 1;
  string name = 2;
  repeated string scopes = 3;
}

message DeleteSiteTokenRequest {
  string site_id = 1;
  string token_id = 2;
}
