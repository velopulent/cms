syntax = "proto3";

package cms.admin.v1;

service SiteService {
  rpc ListSites(ListSitesRequest) returns (ListSitesResponse);
  rpc GetSite(GetSiteRequest) returns (Site);
  rpc CreateSite(CreateSiteRequest) returns (Site);
  rpc UpdateSite(UpdateSiteRequest) returns (Site);
  rpc DeleteSite(DeleteSiteRequest) returns (DeleteResponse);
}

service MembershipService {
  rpc ListMembers(ListMembersRequest) returns (ListMembersResponse);
  rpc InviteMember(InviteMemberRequest) returns (SiteMember);
  rpc UpdateMemberRole(UpdateMemberRoleRequest) returns (SiteMember);
  rpc RemoveMember(RemoveMemberRequest) returns (DeleteResponse);
}

service TokenService {
  rpc ListInstanceTokens(ListInstanceTokensRequest) returns (ListInstanceTokensResponse);
  rpc CreateInstanceToken(CreateInstanceTokenRequest) returns (CreateTokenResponse);
  rpc DeleteInstanceToken(DeleteInstanceTokenRequest) returns (DeleteResponse);
  rpc ListSiteTokens(ListSiteTokensRequest) returns (ListSiteTokensResponse);
  rpc CreateSiteToken(CreateSiteTokenRequest) returns (CreateTokenResponse);
  rpc DeleteSiteToken(DeleteSiteTokenRequest) returns (DeleteResponse);
}

message Site {
  string id = 1;
  string name = 2;
  string default_storage_provider = 3;
  string created_by = 4;
  string created_at = 5;
  string updated_at = 6;
}

message SiteMember {
  string id = 1;
  string site_id = 2;
  string user_id = 3;
  string username = 4;
  string email = 5;
  string role = 6;
  string created_at = 7;
}

message AccessToken {
  string id = 1;
  string kind = 2;
  optional string site_id = 3;
  string name = 4;
  string token_prefix = 5;
  repeated string scopes = 6;
  optional string created_by_user_id = 7;
  optional string last_used_at = 8;
  string created_at = 9;
  optional string expires_at = 10;
  optional string revoked_at = 11;
}

message CreateTokenResponse {
  AccessToken access_token = 1;
  string token = 2;
}

message DeleteResponse {
  bool success = 1;
  string message = 2;
}

message ListSitesRequest {}

message ListSitesResponse {
  repeated Site sites = 1;
}

message GetSiteRequest {
  string site_id = 1;
}

message CreateSiteRequest {
  string name = 1;
  optional string default_storage_provider = 2;
}

message UpdateSiteRequest {
  string site_id = 1;
  optional string name = 2;
  optional string default_storage_provider = 3;
}

message DeleteSiteRequest {
  string site_id = 1;
}

message ListMembersRequest {
  string site_id = 1;
}

message ListMembersResponse {
  repeated SiteMember members = 1;
}

message InviteMemberRequest {
  string site_id = 1;
  string username = 2;
  string role = 3;
}

message UpdateMemberRoleRequest {
  string site_id = 1;
  string user_id = 2;
  string role = 3;
}

message RemoveMemberRequest {
  string site_id = 1;
  string user_id = 2;
}

message ListInstanceTokensRequest {}

message ListInstanceTokensResponse {
  repeated AccessToken tokens = 1;
}

message CreateInstanceTokenRequest {
  string name = 1;
  repeated string scopes = 2;
}

message DeleteInstanceTokenRequest {
  string token_id = 1;
}

message ListSiteTokensRequest {
  string site_id = 1;
}

message ListSiteTokensResponse {
  repeated AccessToken tokens = 1;
}

message CreateSiteTokenRequest {
  string site_id = 1;
  string name = 2;
  repeated string scopes = 3;
}

message DeleteSiteTokenRequest {
  string site_id = 1;
  string token_id = 2;
}
